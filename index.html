<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>笔仙助手 — 三句话，AI 写完一本小说</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.1.0/style.css">
<style>
  :root {
    --bg: #050805;
    --ink: #e6efe7;
    --ink-soft: #6b7a6e;
    --ink-dim: #3a463d;
    --green: #5ef0a3;
    --green-deep: #1a8a5a;
    --border: rgba(255,255,255,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Ma Shan Zheng', 'KaiTi', '楷体', cursive;
    letter-spacing: 0.03em;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  .bg-glow {
    position: fixed; inset: 0; z-index: -2; pointer-events: none;
    background:
      radial-gradient(ellipse 900px 700px at 25% 60%, rgba(94,240,163,0.16), transparent 60%),
      radial-gradient(ellipse 600px 800px at 75% 40%, rgba(94,240,163,0.05), transparent 70%);
  }
  .bg-lines {
    position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.5;
    background-image: linear-gradient(90deg, transparent 0, transparent calc(100% - 1px), rgba(94,240,163,0.06) 100%);
    background-size: 120px 100%;
    mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
  }

  /* === 左上 Logo === */
  .brand {
    position: fixed; top: 32px; left: 80px;
    display: flex; align-items: center; gap: 14px;
    z-index: 50;
    opacity: 0;
    animation: rise 1s .1s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .brand img {
    width: 44px; height: 44px;
    border-radius: 10px;
    filter: drop-shadow(0 0 20px rgba(94,240,163,0.35));
  }
  .brand-name {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 28px;
    color: var(--ink);
    letter-spacing: 0.04em;
    line-height: 1;
  }

  main {
    position: relative;
    width: 100%; height: 100vh;
    padding: 0 80px;
    display: flex; align-items: center;
  }

  .hero {
    max-width: 760px;
    position: relative; z-index: 10;
    opacity: 0; transform: translateY(20px);
    animation: rise 1.2s .3s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-weight: 400;
    font-size: clamp(60px, 8vw, 120px);
    line-height: 1.15;
    letter-spacing: 0.03em;
    margin-bottom: 36px;
  }
  h1 .l1 { color: var(--ink-soft); display: block; opacity: 0.75; }
  h1 .l2, h1 .l3 {
    display: block;
    background: linear-gradient(135deg, #a8ffd0 0%, #5ef0a3 50%, #1a8a5a 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    filter: drop-shadow(0 4px 30px rgba(94,240,163,0.25));
  }

  /* AI 徽章：行楷字体里嵌入的高亮标记 */
  .ai-mark {
    font-family: 'LXGW WenKai Screen', 'LXGW WenKai', sans-serif;
    font-weight: 700;
    font-size: 0.78em;
    display: inline-block;
    padding: 0.05em 0.32em 0.12em;
    margin: 0 0.14em 0 0.06em;
    border-radius: 0.22em;
    background: linear-gradient(135deg, #5ef0a3 0%, #a8ffd0 50%, #5ef0a3 100%);
    background-size: 200% 200%;
    color: #051110;
    letter-spacing: 0.04em;
    transform: translateY(-0.06em) rotate(-2deg);
    box-shadow:
      0 0 0 1px rgba(94,240,163,0.4),
      0 8px 28px -4px rgba(94,240,163,0.6),
      inset 0 -2px 0 rgba(0,0,0,0.15);
    animation: aiShimmer 4s ease-in-out infinite;
    position: relative;
  }
  .ai-mark::after {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 0.32em;
    background: radial-gradient(ellipse, rgba(94,240,163,0.4), transparent 70%);
    z-index: -1; filter: blur(12px);
  }
  @keyframes aiShimmer {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .sub {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 22px; line-height: 1.9;
    letter-spacing: 0.04em;
    color: #b5c3b8;
    max-width: 620px;
    margin-bottom: 48px;
  }

  /* === 下载按钮（三个并排） === */
  .downloads {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .dl {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 22px;
    border-radius: 14px;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    cursor: pointer;
    text-decoration: none; color: var(--ink);
    transition: all .3s cubic-bezier(.2,.8,.2,1);
    position: relative;
    min-width: 200px;
    font-family: 'LXGW WenKai Screen', 'LXGW WenKai', sans-serif;
  }
  .dl:hover {
    border-color: rgba(94,240,163,0.4);
    transform: translateY(-2px);
    background: rgba(94,240,163,0.04);
  }
  .dl.primary {
    background: rgba(94,240,163,0.1);
    border-color: rgba(94,240,163,0.45);
    box-shadow: 0 0 0 1px rgba(94,240,163,0.15) inset, 0 12px 40px -12px rgba(94,240,163,0.45);
  }
  .dl.primary .dl-icon svg { fill: var(--green); }
  .dl.primary .dl-tag { color: var(--green); }
  .dl.disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

  .dl-icon {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .dl-icon svg { width: 26px; height: 26px; fill: var(--ink); transition: fill .3s; }
  .dl-text { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .dl-tag {
    font-size: 10px; letter-spacing: 0.14em;
    color: var(--ink-soft); text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
  }
  .dl-tag .badge {
    padding: 1px 6px; border: 1px solid currentColor;
    border-radius: 4px; font-size: 9px; opacity: 0.7;
  }
  .dl-name { font-size: 15px; font-weight: 500; }

  /* macOS 下拉按钮 */
  .dl-mac { padding-right: 8px; }
  .dl-mac .dl-arch {
    font-size: 11px; color: var(--ink-soft);
    margin-top: 1px;
  }
  .dl-caret {
    width: 32px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-left: 1px solid var(--border);
    margin-left: 6px;
    border-radius: 0 10px 10px 0;
    transition: background .2s;
  }
  .dl-caret:hover { background: rgba(94,240,163,0.08); }
  .dl-caret svg { width: 12px; height: 12px; fill: var(--ink-soft); transition: transform .3s; }
  .dl-mac.open .dl-caret svg { transform: rotate(180deg); }

  .dl-menu {
    position: absolute; top: calc(100% + 12px); left: 0; right: 0;
    background: linear-gradient(180deg, rgba(15,22,17,0.95), rgba(8,12,9,0.95));
    backdrop-filter: blur(20px);
    border: 1px solid rgba(94,240,163,0.18);
    border-radius: 14px;
    padding: 6px;
    box-shadow:
      0 24px 60px -10px rgba(0,0,0,0.85),
      0 0 40px -10px rgba(94,240,163,0.25),
      inset 0 1px 0 rgba(255,255,255,0.05);
    opacity: 0; pointer-events: none; transform: translateY(-8px) scale(.98);
    transform-origin: top center;
    transition: all .3s cubic-bezier(.2,.8,.2,1);
    z-index: 100;
  }
  /* 小三角指示器 */
  .dl-menu::before {
    content: '';
    position: absolute; top: -6px; left: 28px;
    width: 12px; height: 12px;
    background: linear-gradient(135deg, rgba(15,22,17,0.95), rgba(15,22,17,0.95));
    border-top: 1px solid rgba(94,240,163,0.18);
    border-left: 1px solid rgba(94,240,163,0.18);
    transform: rotate(45deg);
  }
  .dl-mac.open .dl-menu { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }

  .dl-menu a {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-radius: 9px;
    text-decoration: none; color: var(--ink);
    font-size: 15px;
    font-family: 'LXGW WenKai Screen', 'LXGW WenKai', sans-serif;
    letter-spacing: 0.02em;
    transition: all .2s;
    position: relative;
  }
  .dl-menu a .opt-icon {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    opacity: 0.7;
    transition: opacity .2s;
  }
  .dl-menu a .opt-icon svg { width: 18px; height: 18px; fill: var(--ink); }
  .dl-menu a .opt-arrow {
    margin-left: auto;
    color: var(--ink-dim);
    transition: transform .2s, color .2s;
  }
  .dl-menu a:hover {
    background: linear-gradient(90deg, rgba(94,240,163,0.12), rgba(94,240,163,0.04));
    color: var(--green);
  }
  .dl-menu a:hover .opt-icon { opacity: 1; }
  .dl-menu a:hover .opt-icon svg { fill: var(--green); }
  .dl-menu a:hover .opt-arrow { color: var(--green); transform: translateX(2px); }

  .meta {
    display: flex; gap: 32px; font-size: 16px;
    color: #c5d2c7; font-weight: 500;
    margin-top: 8px;
    letter-spacing: 0.04em;
  }
  .meta span { display: flex; align-items: center; gap: 12px; }
  .meta span::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
  }

  /* === 右侧漂浮插图 === */
  .floaters {
    position: absolute; inset: 0; pointer-events: none;
    z-index: 1;
  }
  .float {
    position: absolute;
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      0 30px 80px -20px rgba(0,0,0,0.8),
      0 0 0 1px rgba(255,255,255,0.06) inset;
    opacity: 0;
    transform: translateY(40px);
    animation: floatIn 1.4s cubic-bezier(.2,.8,.2,1) forwards,
               drift 14s ease-in-out infinite;
  }
  .float img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .float::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 50%, rgba(94,240,163,0.18) 100%);
    mix-blend-mode: screen;
  }
  .float::before {
    content: ''; position: absolute; inset: -1px; border-radius: 15px;
    background: linear-gradient(135deg, rgba(94,240,163,0.3), transparent 60%);
    z-index: -1; filter: blur(20px); opacity: 0.6;
  }

  @keyframes floatIn { to { opacity: 1; transform: translateY(0); } }
  @keyframes drift {
    0%,100% { translate: 0 0; }
    50% { translate: 0 -14px; }
  }

  /* 位置：原 f1(大纲) 和 f4(书架) 互换 */
  .f1 { /* 书架 (原大纲位置) */
    width: 360px; aspect-ratio: 16/9;
    top: 8%; right: 6%;
    rotate: -4deg;
    animation-delay: .5s, 0s;
  }
  .f2 { /* 人物档案 */
    width: 420px; aspect-ratio: 16/9;
    top: 32%; right: 22%;
    rotate: 5deg;
    z-index: 2;
    animation-delay: .8s, -3s;
  }
  .f3 { /* 阅读 */
    width: 340px; aspect-ratio: 16/9;
    bottom: 10%; right: 4%;
    rotate: -6deg;
    animation-delay: 1.1s, -6s;
  }
  .f4 { /* 大纲 (原书架位置) */
    width: 280px; aspect-ratio: 16/9;
    bottom: 22%; right: 32%;
    rotate: 7deg;
    z-index: 3;
    animation-delay: 1.4s, -9s;
  }

  @media (max-width: 1100px) {
    .f4 { display: none; }
    .f1, .f2, .f3 { width: 280px; }
    .f2 { right: 6%; }
    .brand { left: 32px; }
    main { padding: 0 32px; }
  }
  @media (max-width: 900px) {
    main { padding: 110px 24px 40px; align-items: flex-start; height: auto; min-height: 100vh; }
    body { overflow-y: auto; }
    .floaters { position: relative; height: 360px; margin-top: 60px; }
    .float { width: 200px !important; }
    .f1 { top: 0; right: 0; }
    .f2 { top: 80px; right: 60px; }
    .f3 { top: 160px; right: 20px; }
    .downloads { flex-direction: column; }
    .dl { width: 100%; }
  }
</style>
</head>

<script>
  // 鼠标视差
  const floats = document.querySelectorAll('.float');
  let mx = 0, my = 0, tx = 0, ty = 0;
  window.addEventListener('mousemove', (e) => {
    mx = (e.clientX / window.innerWidth - 0.5);
    my = (e.clientY / window.innerHeight - 0.5);
  });
  (function tick() {
    tx += (mx - tx) * 0.06;
    ty += (my - ty) * 0.06;
    floats.forEach((f, i) => {
      const depth = (i + 1) * 12;
      f.style.translate = `${-tx * depth}px ${-ty * depth * 0.6}px`;
    });
    requestAnimationFrame(tick);
  })();

  // 平台架构检测
  async function detectArch() {
    const ua = navigator.userAgent;
    const isMac = /Macintosh|Mac OS X/i.test(ua);
    let arch = 'arm64'; // 默认推荐 Apple Silicon

    if (isMac && navigator.userAgentData?.getHighEntropyValues) {
      try {
        const info = await navigator.userAgentData.getHighEntropyValues(['architecture']);
        if (info.architecture === 'x86') arch = 'x64';
      } catch {}
    }
    // 回退：旧 Intel Mac 通常 UA 不带 ARM 标识，但 2026 年默认推荐 ARM
    return arch;
  }

  const DL_ARM = 'https://github.com/LiangLuDev/BiXian-AI-Novel/releases/latest/download/BiXianAssistant-1.0.0-arm64.dmg';
  const DL_X64 = 'https://github.com/LiangLuDev/BiXian-AI-Novel/releases/latest/download/BiXianAssistant-1.0.0-x64.dmg';

  detectArch().then(arch => {
    const macArchEl = document.getElementById('mac-arch');
    const mainLink = document.getElementById('dl-mac-link');
    const armOpt = document.querySelector('.opt-arm');
    const x64Opt = document.querySelector('.opt-x64');
    if (arch === 'arm64') {
      macArchEl.textContent = 'Apple Silicon';
      mainLink.href = DL_ARM;
      armOpt.style.display = 'none';
    } else {
      macArchEl.textContent = 'Intel';
      mainLink.href = DL_X64;
      x64Opt.style.display = 'none';
    }
  });

  // macOS 下拉
  const macWrap = document.getElementById('dl-mac');
  const caret = document.getElementById('mac-caret');
  caret.addEventListener('click', (e) => {
    e.stopPropagation();
    macWrap.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (!macWrap.contains(e.target)) macWrap.classList.remove('open');
  });
</script>

</body>
</html>
